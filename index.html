<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium Eisenhower Matrix productivity application to help you prioritize tasks effectively.">
    <title>Eisenhower Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Boxicons for premium icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="background-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>Eisenhower Matrix</h1>
                <p>Prioritize your tasks effectively.</p>
            </div>
            <div class="stats" id="task-stats">
                0 tasks pending
            </div>
        </header>

        <div class="add-task-bar">
            <div class="input-group title-input">
                <label for="task-title">Task Title *</label>
                <input type="text" id="task-title" placeholder="What needs to be done?" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="task-date">Due Date</label>
                <input type="date" id="task-date">
            </div>
            <div class="input-group notes-input">
                <label for="task-notes">Notes</label>
                <input type="text" id="task-notes" placeholder="Optional notes..." autocomplete="off">
            </div>
            <div class="input-group">
                <label for="task-quadrant">Quadrant</label>
                <select id="task-quadrant">
                    <option value="do">Do First</option>
                    <option value="schedule">Schedule</option>
                    <option value="delegate">Delegate</option>
                    <option value="eliminate">Eliminate</option>
                </select>
            </div>
            <button class="add-btn" onclick="addTask()">Add Task</button>
        </div>

        <div class="matrix-grid">
            <!-- Quadrant 1: Urgent & Important -->
            <section class="quadrant q1" data-quadrant="do" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
                <header class="quadrant-header">
                    <h2><i class='bx bx-run'></i> Do First</h2>
                    <span class="subtitle">Urgent & Important</span>
                </header>
                <div class="task-list" id="list-do"></div>
            </section>

            <!-- Quadrant 2: Not Urgent & Important -->
            <section class="quadrant q2" data-quadrant="schedule" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
                <header class="quadrant-header">
                    <h2><i class='bx bx-calendar-event'></i> Schedule</h2>
                    <span class="subtitle">Not Urgent & Important</span>
                </header>
                <div class="task-list" id="list-schedule"></div>
            </section>

            <!-- Quadrant 3: Urgent & Not Important -->
            <section class="quadrant q3" data-quadrant="delegate" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
                <header class="quadrant-header">
                    <h2><i class='bx bx-group'></i> Delegate</h2>
                    <span class="subtitle">Urgent & Not Important</span>
                </header>
                <div class="task-list" id="list-delegate"></div>
            </section>

            <!-- Quadrant 4: Not Urgent & Not Important -->
            <section class="quadrant q4" data-quadrant="eliminate" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
                <header class="quadrant-header">
                    <h2><i class='bx bx-trash'></i> Eliminate</h2>
                    <span class="subtitle">Not Urgent & Not Important</span>
                </header>
                <div class="task-list" id="list-eliminate"></div>
            </section>
        </div>

        <div class="completed-section glass-panel" id="completed-section" style="display: none;">
            <div class="completed-header" onclick="toggleCompleted()">
                <h3>
                    <i class='bx bx-check-circle'></i> Completed Tasks
                    <span class="count" id="completed-count">0</span>
                </h3>
                <i class='bx bx-chevron-down toggle-icon'></i>
            </div>
            <div class="completed-list" id="completed-list"></div>
        </div>

        <!-- Edit Modal -->
        <div class="modal-overlay" id="edit-modal">
            <div class="modal glass-panel">
                <h3><i class='bx bx-edit'></i> Edit Task</h3>
                <input type="hidden" id="edit-task-id">
                <div class="input-group">
                    <label for="edit-title">Title *</label>
                    <input type="text" id="edit-title" placeholder="Task title">
                </div>
                <div class="input-group">
                    <label for="edit-date">Due Date</label>
                    <input type="date" id="edit-date">
                </div>
                <div class="input-group">
                    <label for="edit-notes">Notes</label>
                    <textarea id="edit-notes" placeholder="Optional notes..."></textarea>
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel-btn" onclick="closeEditModal()">Cancel</button>
                    <button class="modal-btn save-btn" onclick="saveTaskEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
